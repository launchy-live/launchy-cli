name: Publish to npm

# Publishes when you create a GitHub Release (or run this manually).
# Requires repo secret NPM_TOKEN — an npm "Automation" token, which is exempt
# from the interactive 2FA/OTP prompt. See docs/releasing.md.

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # required for npm provenance attestation
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: npm
          registry-url: https://registry.npmjs.org
      - run: npm ci
      - run: npm test
      - name: Verify package.json version matches the release tag
        if: github.event_name == 'release'
        run: |
          tag="${GITHUB_REF_NAME#v}"
          pkg="$(node -p "require('./package.json').version")"
          if [ "$tag" != "$pkg" ]; then
            echo "::error::tag $tag does not match package.json version $pkg"
            exit 1
          fi
      - run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
